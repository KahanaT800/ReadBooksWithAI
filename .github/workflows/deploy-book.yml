name: Deploy Book to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'books/c-and-pointers/**'
      - '.github/workflows/deploy-book.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: books/c-and-pointers
        run: |
          npm install
          ln -s $(pwd)/plugins/honkit-plugin-mermaid-cdn node_modules/honkit-plugin-mermaid-cdn

      - name: Build book
        working-directory: books/c-and-pointers
        run: npx honkit build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: books/c-and-pointers/_book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
