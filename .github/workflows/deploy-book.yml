name: Deploy Books to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'books/**'
      - '.github/workflows/deploy-book.yml'
      - '_site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build: Pointers on C
      - name: Install dependencies (pointers-on-c)
        working-directory: books/c-and-pointers
        run: |
          npm install
          ln -s $(pwd)/plugins/honkit-plugin-mermaid-cdn node_modules/honkit-plugin-mermaid-cdn

      - name: Build book (pointers-on-c)
        working-directory: books/c-and-pointers
        run: npx honkit build . ../../_site/pointers-on-c

      # Add more books here:
      # - name: Install dependencies (another-book)
      #   working-directory: books/another-book
      #   run: |
      #     npm install
      #     ln -s $(pwd)/plugins/... node_modules/...
      # - name: Build book (another-book)
      #   working-directory: books/another-book
      #   run: npx honkit build . ../../_site/another-book

      # Copy landing page
      - name: Copy landing page
        run: cp _site/index.html _site/index.html 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
